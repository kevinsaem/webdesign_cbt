<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f2430" />
  <meta name="description" content="근호 전용 웹디자인개발기능사 문제풀이 - 1,000문제 변형 학습, 시험권 시스템, 점수 추이 추적" />
  <title>근호 전용 - 웹디자인개발기능사 문제풀이</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- 상단바 -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 18h18l-2-9-4 3-3-7-3 7-4-3-2 9z"/>
          </svg>
        </div>
        <div>
          <div class="brand-title">웹디자인개발기능사</div>
          <div class="brand-sub">근호 전용 문제집</div>
        </div>
      </div>
      <button class="topbtn" id="btn-quit">홈</button>
    </header>

    <main>
      <!-- 홈 -->
      <section id="view-home" class="view">
        <div class="card hero">
          <div class="hero-badge">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 18h18l-2-9-4 3-3-7-3 7-4-3-2 9z"/>
            </svg>
            <span>근호 전용 문제집</span>
          </div>
          <h1>근호야, 오늘도 차근차근</h1>
          <p>총 <strong>1,000문항</strong>의 변형 문제로 같은 개념을 반복 학습하고, 시험을 볼 때마다 점수가 어떻게 오르는지 그래프로 확인할 수 있어.</p>
        </div>

        <!-- 시험권 상태 -->
        <div id="ticket-status"></div>

        <!-- 점수 추이 -->
        <div class="section-title">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="3" y1="20" x2="21" y2="20"/>
            <polyline points="5 17 9 11 13 13 19 6"/>
          </svg>
          <span>내 점수 추이</span>
        </div>
        <div class="card stats-card">
          <div id="stats-area"></div>
        </div>

        <!-- 학습 모드 -->
        <div class="section-title">학습 모드</div>
        <div class="mode-grid">
          <button class="mode-card" id="mode-practice">
            <div class="mode-ico">
              <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 20h9"/>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
            </div>
            <div class="title">연습 모드</div>
            <div class="desc" id="mode-practice-desc">30문항 · 풀이마다 해설과 쉬운 설명</div>
          </button>
          <button class="mode-card" id="mode-exam">
            <div class="mode-ico">
              <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="13" r="8"/>
                <polyline points="12 9 12 13 15 15"/>
                <line x1="9" y1="2" x2="15" y2="2"/>
              </svg>
            </div>
            <div class="title">시험 모드</div>
            <div class="desc" id="mode-exam-desc">실제 시험처럼 60문항 · 합격선 60%</div>
          </button>
          <button class="mode-card" id="btn-wrong">
            <div class="mode-ico">
              <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="1 4 1 10 7 10"/>
                <polyline points="23 20 23 14 17 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
              </svg>
            </div>
            <div class="title">오답 노트</div>
            <div class="desc">틀린 개념만 모아 다시 풀기 (<span id="wrong-count">0</span>개념)</div>
          </button>
          <button class="mode-card" id="mode-concepts">
            <div class="mode-ico">
              <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V2H6.5A2.5 2.5 0 0 0 4 4.5v15z"/>
                <path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20"/>
              </svg>
            </div>
            <div class="title">개념 사전</div>
            <div class="desc">쉬운 비유로 정리한 핵심 개념 (<span id="concept-count">0</span>개)</div>
          </button>
        </div>

        <div class="section-title">단원별 학습</div>
        <div class="card">
          <div id="cat-chips" class="cat-chips"></div>
        </div>

        <div class="section-title">기타</div>
        <div class="card" style="display:flex;justify-content:space-between;align-items:center;font-size:14px;color:var(--muted);flex-wrap:wrap;gap:8px">
          <div>전체 문제 수 <strong id="total-count" style="color:var(--text)">0</strong>문항</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="chip danger hidden" id="btn-clear-wrong">오답노트 비우기</button>
            <button class="chip danger" id="btn-reset-exam">응시 데이터 초기화</button>
          </div>
        </div>
      </section>

      <!-- 문제풀이 -->
      <section id="view-quiz" class="view hidden">
        <div class="quiz-head">
          <button class="topbtn" id="btn-home-1">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="19" y1="12" x2="5" y2="12"/>
              <polyline points="12 19 5 12 12 5"/>
            </svg>
            <span>홈</span>
          </button>
          <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
          <div class="progress-text" id="progress-text">0 / 0</div>
        </div>
        <div class="section-title" id="quiz-title">학습 중</div>
        <div id="question-area"></div>
      </section>

      <!-- 결과 -->
      <section id="view-result" class="view hidden">
        <div class="quiz-head">
          <button class="topbtn" id="btn-home-2">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="19" y1="12" x2="5" y2="12"/>
              <polyline points="12 19 5 12 12 5"/>
            </svg>
            <span>홈</span>
          </button>
          <div class="progress-text">결과</div>
        </div>
        <div id="result-area"></div>
      </section>

      <!-- 개념 사전 -->
      <section id="view-concepts" class="view hidden">
        <div class="quiz-head">
          <button class="topbtn" id="btn-home-3">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="19" y1="12" x2="5" y2="12"/>
              <polyline points="12 19 5 12 12 5"/>
            </svg>
            <span>홈</span>
          </button>
          <div class="progress-text">개념 사전</div>
        </div>
        <div class="card hero" style="margin-bottom:14px">
          <h1 style="font-size:19px;margin:0 0 4px">쉬운 비유로 보는 핵심 개념</h1>
          <p>카드를 눌러 펼쳐보세요. 한 줄 요약 → 쉬운 비유 → 핵심 포인트 → 시험 함정 순서로 정리했어.</p>
        </div>
        <div id="concept-list" class="concept-list"></div>
      </section>
    </main>

    <footer>
      근호 전용 학습 도우미 · 모바일 최적화
    </footer>
  </div>

  <script src="questions.js"></script>
  <script src="concepts.js"></script>
  <script src="app.js"></script>
</body>
</html>
