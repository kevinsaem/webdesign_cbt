<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#3b66ff" />
  <meta name="description" content="웹디자인개발기능사 필기 문제풀이 - 연습/시험 모드와 초등학생도 이해할 수 있는 쉬운 개념 설명" />
  <title>웹디자인개발기능사 문제풀이</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- 상단바 -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">웹</div>
        <div>웹디자인개발기능사<br><span style="font-weight:400;font-size:12px;color:var(--muted)">필기 문제풀이</span></div>
      </div>
      <button class="topbtn" id="btn-quit">홈</button>
    </header>

    <main>
      <!-- 홈 화면 -->
      <section id="view-home" class="view">
        <div class="card hero">
          <h1>변형 문제로 반복 학습 🚀</h1>
          <p>같은 개념을 여러 형태의 문제로 풀어보고, 어려운 용어는 초등학생도 알 만한 쉬운 비유로 이해해요.</p>
        </div>

        <div class="section-title">학습 모드</div>
        <div class="mode-grid">
          <button class="mode-card" id="mode-practice">
            <div class="emoji">📝</div>
            <div class="title">연습 모드</div>
            <div class="desc">한 문제씩 채점하며 해설과 쉬운 설명을 바로 확인</div>
          </button>
          <button class="mode-card" id="mode-exam">
            <div class="emoji">⏱️</div>
            <div class="title">시험 모드</div>
            <div class="desc">실제 시험처럼 한꺼번에 풀고 마지막에 채점 · 합격선 60%</div>
          </button>
          <button class="mode-card" id="btn-wrong">
            <div class="emoji">🔁</div>
            <div class="title">오답 노트</div>
            <div class="desc">틀린 문제만 다시 풀기 (<span id="wrong-count">0</span>문항)</div>
          </button>
          <button class="mode-card" id="mode-concepts">
            <div class="emoji">📚</div>
            <div class="title">개념 사전</div>
            <div class="desc">쉬운 비유로 정리한 핵심 개념 (<span id="concept-count">0</span>개)</div>
          </button>
        </div>

        <div class="section-title">단원별 학습</div>
        <div class="card">
          <div id="cat-chips" class="cat-chips"></div>
        </div>

        <div class="section-title">기타</div>
        <div class="card" style="display:flex;justify-content:space-between;align-items:center;font-size:14px;color:var(--muted)">
          <div>전체 문제 수: <strong id="total-count" style="color:var(--text)">0</strong>문항</div>
          <button class="chip danger hidden" id="btn-clear-wrong">오답노트 비우기</button>
        </div>
      </section>

      <!-- 문제풀이 화면 -->
      <section id="view-quiz" class="view hidden">
        <div class="quiz-head">
          <button class="topbtn" id="btn-home-1">← 홈</button>
          <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
          <div class="progress-text" id="progress-text">0 / 0</div>
        </div>
        <div class="section-title" id="quiz-title">학습 중</div>
        <div id="question-area"></div>
      </section>

      <!-- 결과 화면 -->
      <section id="view-result" class="view hidden">
        <div class="quiz-head">
          <button class="topbtn" id="btn-home-2">← 홈</button>
          <div class="progress-text">결과</div>
        </div>
        <div id="result-area"></div>
      </section>

      <!-- 개념 사전 -->
      <section id="view-concepts" class="view hidden">
        <div class="quiz-head">
          <button class="topbtn" id="btn-home-3">← 홈</button>
          <div class="progress-text">개념 사전</div>
        </div>
        <div class="card hero" style="margin-bottom:14px">
          <h1 style="font-size:19px;margin:0 0 4px">쉬운 비유로 보는 핵심 개념</h1>
          <p>카드를 눌러 펼쳐보세요. 한 줄 요약 → 쉬운 비유 → 핵심 포인트 → 시험 함정 순서로 정리했어요.</p>
        </div>
        <div id="concept-list" class="concept-list"></div>
      </section>
    </main>

    <footer>
      © 웹디자인개발기능사 학습 도우미 · 모바일에서도 잘 보여요 📱
    </footer>
  </div>

  <script src="questions.js"></script>
  <script src="concepts.js"></script>
  <script src="app.js"></script>
</body>
</html>
